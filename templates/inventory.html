{% extends 'base.html' %}
{% block title %}Inventory{% endblock %}

{% block content %}
<h1>📦 Inventory Management</h1>

<div class="glass-card">
    <h2>Add New Product</h2>
    <form method="POST" action="{{ url_for('inventory') }}">
        <input type="hidden" name="action" value="add">
        <div class="form-row">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" placeholder="E.g. Fancy Coffee" required>
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" step="0.01" name="price" min="0" required>
            </div>
            <div class="form-group">
                <label>Initial Stock</label>
                <input type="number" name="stock" min="0" required>
            </div>
            <button type="submit">➕ Add Product</button>
        </div>
    </form>
</div>

<div class="glass-card">
    <h2>Current Products</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Product Name</th>
                <th>Price</th>
                <th>Stock Left</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for item in products %}
            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.name }}</td>
                <form method="POST" action="{{ url_for('inventory') }}">
                    <input type="hidden" name="action" value="update">
                    <input type="hidden" name="product_id" value="{{ item.id }}">
                    <td>
                        <input type="number" step="0.01" name="price" value="{{ item.price }}" style="width: 100px;">
                    </td>
                    <td>
                        <input type="number" name="stock" value="{{ item.stock }}" style="width: 100px;">
                    </td>
                    <td>
                        <button type="submit" style="padding: 0.5rem 1rem; font-size: 0.85rem;">🔄 Update</button>
                    </td>
                </form>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
